<template>
    <lightning-card title="My Service Requests" icon-name="standard:task">
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                onclick={handleRefresh}>
            </lightning-button-icon>
        </div>

        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading service requests..."></lightning-spinner>
            </div>
        </template>

        <template if:true={error}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    {error}
                </div>
            </div>
        </template>

        <template if:true={isEmpty}>
            <div class="slds-illustration slds-p-around_large slds-text-align_center">
                <div class="slds-text-heading_medium slds-text-color_weak">
                    No service requests yet
                </div>
                <p class="slds-text-body_regular slds-text-color_weak slds-p-top_x-small">
                    Service requests are created automatically when one of your assets is marked Installed.
                </p>
            </div>
        </template>

        <template if:true={hasData}>
            <div class="slds-p-horizontal_small">
                <p class="slds-text-body_small slds-text-color_weak slds-p-bottom_x-small">
                    {taskCount} service request(s) on your account
                </p>
                <lightning-datatable
                    key-field="id"
                    data={tasks}
                    columns={columns}
                    hide-checkbox-column="true">
                </lightning-datatable>
            </div>
        </template>
    </lightning-card>
</template>
