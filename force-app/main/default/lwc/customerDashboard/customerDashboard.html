<template>
    <lightning-card>
        <div slot="title" class="slds-grid slds-grid_vertical-align-center">
            <lightning-icon icon-name="standard:home" size="medium" class="slds-m-right_small"></lightning-icon>
            <div>
                <h1 class="slds-text-heading_medium">Welcome back!</h1>
                <template if:true={summary.accountName}>
                    <p class="slds-text-body_small slds-text-color_weak">
                        {summary.accountName}
                    </p>
                </template>
            </div>
        </div>

        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading..."></lightning-spinner>
            </div>
        </template>

        <template if:false={isLoading}>
            <div class="slds-grid slds-gutters slds-wrap slds-p-around_medium">

                <!-- KPI: Assets Owned -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                    <div class="slds-box slds-theme_default slds-text-align_center">
                        <lightning-icon icon-name="standard:asset_object" size="medium"></lightning-icon>
                        <div class="slds-text-heading_large slds-p-top_small">
                            {summary.assetsOwned}
                        </div>
                        <div class="slds-text-body_regular slds-text-color_weak">
                            Assets Owned
                        </div>
                    </div>
                </div>

                <!-- KPI: Active Warranties -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                    <div class="slds-box slds-theme_default slds-text-align_center">
                        <lightning-icon icon-name="standard:warranty_term" size="medium"></lightning-icon>
                        <div class="slds-text-heading_large slds-p-top_small slds-text-color_success">
                            {summary.activeWarranties}
                        </div>
                        <div class="slds-text-body_regular slds-text-color_weak">
                            Active Warranties
                        </div>
                    </div>
                </div>

                <!-- KPI: Open Tasks -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3">
                    <div class="slds-box slds-theme_default slds-text-align_center">
                        <lightning-icon icon-name="standard:task" size="medium"></lightning-icon>
                        <div class={openTaskColorClass}>
                            {summary.openTasks}
                        </div>
                        <div class="slds-text-body_regular slds-text-color_weak">
                            Open Service Requests
                        </div>
                    </div>
                </div>
            </div>

            <div class="slds-p-horizontal_medium slds-p-bottom_medium slds-text-body_small slds-text-color_weak">
                <lightning-icon icon-name="utility:info_alt" size="xx-small" class="slds-m-right_x-small"></lightning-icon>
                Use the navigation above to view your full asset list, register warranties, or track service requests.
            </div>
        </template>
    </lightning-card>
</template>
