<template>
    <lightning-card title="My Assets" icon-name="standard:asset_object">
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                alternative-text="Refresh"
                onclick={handleRefresh}>
            </lightning-button-icon>
        </div>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading your assets..."></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template if:true={error}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    <h2>{error}</h2>
                </div>
            </div>
        </template>

        <!-- Empty state -->
        <template if:true={isEmpty}>
            <div class="slds-illustration slds-illustration_small slds-p-around_large slds-text-align_center">
                <div class="slds-text-heading_medium slds-text-color_weak slds-p-vertical_medium">
                    No assets yet
                </div>
                <p class="slds-text-body_regular slds-text-color_weak">
                    Once your sales rep contracts a quote with hardware items, your assets will appear here automatically.
                </p>
            </div>
        </template>

        <!-- Data table -->
        <template if:true={hasData}>
            <div class="slds-p-horizontal_small">
                <p class="slds-text-body_small slds-text-color_weak slds-p-bottom_x-small">
                    Showing {assetCount} asset(s) for your account
                </p>
                <lightning-datatable
                    key-field="id"
                    data={assets}
                    columns={columns}
                    hide-checkbox-column="true"
                    onrowaction={handleRowAction}>
                </lightning-datatable>
            </div>
        </template>
    </lightning-card>
</template>
