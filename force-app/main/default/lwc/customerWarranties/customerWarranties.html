<template>
    <!-- ============ Existing Warranties List ============ -->
    <lightning-card title="My Warranties" icon-name="standard:warranty_term">
        <div slot="actions">
            <lightning-button
                label="Register New Warranty"
                variant="brand"
                icon-name="utility:add"
                onclick={openForm}>
            </lightning-button>
        </div>

        <template if:true={isLoading}>
            <div class="slds-p-around_medium slds-align_absolute-center">
                <lightning-spinner alternative-text="Loading warranties..."></lightning-spinner>
            </div>
        </template>

        <template if:true={listError}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    {listError}
                </div>
            </div>
        </template>

        <template if:true={isListEmpty}>
            <div class="slds-illustration slds-p-around_large slds-text-align_center">
                <div class="slds-text-heading_medium slds-text-color_weak">
                    No warranties registered yet
                </div>
                <p class="slds-text-body_regular slds-text-color_weak slds-p-top_x-small">
                    Click "Register New Warranty" above to protect one of your assets.
                </p>
            </div>
        </template>

        <template if:true={hasWarranties}>
            <div class="slds-p-horizontal_small">
                <lightning-datatable
                    key-field="id"
                    data={warranties}
                    columns={columns}
                    hide-checkbox-column="true">
                </lightning-datatable>
            </div>
        </template>
    </lightning-card>

    <!-- ============ Registration Form Modal ============ -->
    <template if:true={isFormOpen}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            onclick={closeForm}>
                        <lightning-icon icon-name="utility:close" size="small"
                                        variant="inverse" alternative-text="Close"></lightning-icon>
                    </button>
                    <h2 class="slds-modal__title slds-hyphenate">Register a Warranty</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <!-- Server-side error banner (e.g., addError messages) -->
                    <template if:true={formError}>
                        <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_error slds-m-bottom_medium"
                             role="alert">
                            <span class="slds-assistive-text">Error</span>
                            <lightning-icon icon-name="utility:error" size="x-small"
                                            variant="inverse" class="slds-m-right_x-small"></lightning-icon>
                            {formError}
                        </div>
                    </template>

                    <lightning-combobox
                        name="assetId"
                        label="Asset"
                        value={form.assetId}
                        options={assetOptions}
                        placeholder="Select an asset"
                        required
                        onchange={handleFieldChange}>
                    </lightning-combobox>

                    <lightning-combobox
                        name="status"
                        label="Status"
                        value={form.status}
                        options={statusOptions}
                        required
                        class="slds-m-top_small"
                        onchange={handleFieldChange}>
                    </lightning-combobox>

                    <lightning-input
                        type="date"
                        name="startDate"
                        label="Start Date"
                        value={form.startDate}
                        class="slds-m-top_small"
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <lightning-input
                        type="date"
                        name="endDate"
                        label="End Date"
                        value={form.endDate}
                        class="slds-m-top_small"
                        onchange={handleFieldChange}>
                    </lightning-input>

                    <p class="slds-text-body_small slds-text-color_weak slds-m-top_small">
                        Note: End Date must be after Start Date. Only one Active warranty is allowed per asset.
                    </p>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={closeForm}
                        disabled={isSaving}>
                    </lightning-button>
                    <lightning-button
                        label="Register Warranty"
                        variant="brand"
                        onclick={handleSubmit}
                        disabled={isSaving}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>

                <template if:true={isSaving}>
                    <lightning-spinner alternative-text="Saving..."></lightning-spinner>
                </template>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
